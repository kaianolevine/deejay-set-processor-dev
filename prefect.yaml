name: deejay-cog
prefect-version: 3.4.0

build: null
push: null

pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/mini-app-polis/deejay-cog.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      script: pip install "common-python-utils @ git+https://github.com/mini-app-polis/common-python-utils.git@main" "evaluator-cog @ git+https://github.com/mini-app-polis/evaluator-cog.git@main"
      stream_output: true
  - prefect.deployments.steps.run_shell_script:
      script: pip install -e "{{ clone-step.directory }}"
      stream_output: true

deployments:
  - name: process-new-files
    entrypoint: src/deejay_cog/process_new_files.py:process_new_csv_files_flow
    work_pool:
      name: managed-pool

  - name: update-deejay-set-collection
    entrypoint: src/deejay_cog/update_deejay_set_collection.py:generate_dj_set_collection
    work_pool:
      name: managed-pool

  - name: generate-summaries
    entrypoint: src/deejay_cog/generate_summaries.py:generate_summaries_flow
    work_pool:
      name: managed-pool

  - name: ingest-live-history
    entrypoint: src/deejay_cog/ingest_live_history.py:ingest_live_history
    work_pool:
      name: managed-pool