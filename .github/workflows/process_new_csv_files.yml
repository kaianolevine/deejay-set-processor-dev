name: Process New CSV Files
run-name: Process New CSV Files (${{ github.event_name }})

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new_csv_dj_sets]

concurrency:
  group: dj-set-collection
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      LOGGING_LEVEL: ${{ vars.LOGGING_LEVEL }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      KAIANO_API_BASE_URL: ${{ vars.KAIANO_API_BASE_URL }}
      KAIANO_API_OWNER_ID: ${{ vars.KAIANO_API_OWNER_ID }}
      OWNER_ID: ${{ vars.OWNER_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STANDARDS_VERSION: "6.0"
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      PREFECT_API_URL: https://api.prefect.cloud/api/accounts/${{ vars.PREFECT_ACCOUNT_ID }}/workspaces/${{ vars.PREFECT_WORKSPACE_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Authenticate with Prefect Cloud
        run: uv run prefect cloud login --key ${{ secrets.PREFECT_API_KEY }} --workspace ${{ vars.PREFECT_WORKSPACE }}

      - name: Run process_new_csv_files flow
        run: uv run python -u src/deejay_set_processor/process_new_files.py
